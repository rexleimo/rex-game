<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="山海拾遗">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#1a241c"/>
      <stop offset="45%" stop-color="#243028"/>
      <stop offset="100%" stop-color="#1a1810"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="48%">
      <stop offset="0%" stop-color="#c4a35a" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#6b7f6a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c4a35a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ding" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4bc78"/>
      <stop offset="50%" stop-color="#c4a35a"/>
      <stop offset="100%" stop-color="#8a7340"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- silk grain -->
  <g opacity="0.06" stroke="#e8e0d0" stroke-width="1">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200"/>
  </g>
  <!-- mountains -->
  <path d="M0 470 L160 310 L300 400 L460 250 L640 390 L820 270 L980 400 L1200 290 L1200 630 L0 630 Z" fill="#1e2a22" opacity="0.95"/>
  <path d="M0 520 L200 370 L380 460 L560 330 L740 450 L940 350 L1200 470 L1200 630 L0 630 Z" fill="#16201a" opacity="0.9"/>
  <!-- cloud strokes -->
  <path d="M180 210 Q260 180 340 210 Q280 230 180 210Z" fill="none" stroke="#c4a35a" stroke-width="2" opacity="0.35"/>
  <path d="M860 190 Q940 155 1040 195 Q960 220 860 190Z" fill="none" stroke="#c4a35a" stroke-width="2" opacity="0.3"/>
  <!-- ding -->
  <g transform="translate(600 295)" filter="url(#soft)">
    <path d="M-78 -18 Q-88 42 -52 96 L52 96 Q88 42 78 -18 Q24 -52 -78 -18 Z" fill="none" stroke="url(#ding)" stroke-width="5" stroke-linejoin="round"/>
    <path d="M-58 -38 L-36 -78 L-14 -58" fill="none" stroke="url(#ding)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M58 -38 L36 -78 L14 -58" fill="none" stroke="url(#ding)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M-42 96 L-50 158" fill="none" stroke="url(#ding)" stroke-width="5" stroke-linecap="round"/>
    <path d="M0 96 L0 164" fill="none" stroke="url(#ding)" stroke-width="5" stroke-linecap="round"/>
    <path d="M42 96 L50 158" fill="none" stroke="url(#ding)" stroke-width="5" stroke-linecap="round"/>
    <!-- cloud-thunder hint -->
    <path d="M-36 20 Q-18 4 0 20 Q18 4 36 20" fill="none" stroke="#e8d9a8" stroke-width="2" opacity="0.55"/>
  </g>
  <!-- seal -->
  <g transform="translate(980 120)" opacity="0.75">
    <rect x="-28" y="-28" width="56" height="56" rx="4" fill="none" stroke="#a6332b" stroke-width="2.5"/>
    <text x="0" y="8" text-anchor="middle" fill="#a6332b" font-family="serif" font-size="22">拾</text>
  </g>
  <text x="600" y="512" text-anchor="middle" fill="#f3efe4" font-family="serif" font-size="56" letter-spacing="16">山海拾遗</text>
  <text x="600" y="558" text-anchor="middle" fill="#c4a35a" font-family="sans-serif" font-size="20" letter-spacing="6">修一件器物 · 读懂一段中国故事</text>
  <text x="600" y="592" text-anchor="middle" fill="#8a9a88" font-family="sans-serif" font-size="14" letter-spacing="3">中原 · 楚地 · 巴蜀 · 江南 · 塞北 · 仙山 · 岁时 · 海丝</text>
</svg>
